<div class="animate-in max-w-4xl mx-auto py-8">
    <div class="flex items-center gap-4 mb-10">
        <div class="bg-blue-600 p-3 rounded-2xl text-white shadow-lg shadow-blue-200">
            <i class="bi bi-person-bounding-box text-2xl"></i>
        </div>
        <div>
            <h1 class="text-3xl font-black text-slate-800 mb-0">Mi Perfil</h1>
            <p class="text-slate-500 font-medium">Gestiona tu información personal y seguridad</p>
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
        <!-- Tarjeta de Identidad -->
        <div class="lg:col-span-1">
            <div class="sx-card text-center p-8">
                <div class="relative inline-block mb-6">
                    <img src="https://ui-avatars.com/api/?name={{user.nombre}}&background=0066FF&color=fff&size=128&bold=true" 
                         class="rounded-3xl shadow-xl border-4 border-white mx-auto" width="128" height="128">
                    <div class="absolute -bottom-2 -right-2 bg-green-500 w-8 h-8 rounded-full border-4 border-white shadow-sm flex items-center justify-center text-white">
                        <i class="bi bi-patch-check-fill text-xs"></i>
                    </div>
                </div>
                <h3 class="text-xl font-black text-slate-800 mb-1">{{user.nombre}}</h3>
                <span class="badge-sx info uppercase tracking-widest text-[10px]">{{user.rol}}</span>
                
                <div class="mt-8 pt-8 border-t border-slate-50 text-left space-y-4">
                    <div class="flex items-center gap-3 text-slate-500">
                        <i class="bi bi-envelope text-blue-600"></i>
                        <span class="text-sm font-medium">{{user.email}}</span>
                    </div>
                    <div class="flex items-center gap-3 text-slate-500">
                        <i class="bi bi-calendar-event text-blue-600"></i>
                        <span class="text-sm font-medium">Miembro desde 2024</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Formulario de Edición -->
        <div class="lg:col-span-2">
            <div class="sx-card p-10">
                <h4 class="text-lg font-black text-slate-800 mb-8 border-b border-slate-50 pb-4">Editar Información</h4>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="md:col-span-2">
                        <label class="form-label">Nombre Completo</label>
                        <input type="text" [(ngModel)]="user.nombre" class="form-control h-12" placeholder="Tu nombre">
                    </div>
                    
                    <div>
                        <label class="form-label">Correo Electrónico</label>
                        <input type="email" [(ngModel)]="user.email" class="form-control h-12 bg-slate-50" disabled>
                        <p class="text-[10px] text-slate-400 mt-1 italic">El email no puede ser modificado por seguridad.</p>
                    </div>

                    <div>
                        <label class="form-label">Teléfono / WhatsApp</label>
                        <input type="text" [(ngModel)]="user.telefono" class="form-control h-12" placeholder="+591 7XXXXXXX">
                    </div>

                    <div class="md:col-span-2 mt-4 pt-4 border-t border-slate-50">
                        <h5 class="text-sm font-black text-slate-800 mb-4 uppercase tracking-widest">Seguridad</h5>
                        <label class="form-label">Nueva Contraseña</label>
                        <div class="relative">
                            <i class="bi bi-lock absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                            <input type="password" [(ngModel)]="user.password" class="form-control pl-12 h-12" placeholder="Dejar en blanco para mantener la actual">
                        </div>
                    </div>
                </div>

                <div class="mt-10 flex justify-end">
                    <button class="btn-sx-primary px-12 py-3 text-lg" (click)="guardar()" [disabled]="loading">
                        <span *ngIf="!loading">Guardar Cambios</span>
                        <span *ngIf="loading">Procesando...</span>
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
