<div class="flex min-h-screen bg-slate-50 relative">
    <!-- Overlay para móvil -->
    <div *ngIf="isSidebarOpen" 
         (click)="closeSidebar()"
         class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-40 lg:hidden transition-opacity">
    </div>

    <!-- Sidebar -->
    <app-sidebar 
        [class.translate-x-0]="isSidebarOpen"
        [class.-translate-x-full]="!isSidebarOpen"
        class="fixed inset-y-0 left-0 w-64 bg-white z-50 transform transition-transform duration-300 lg:relative lg:translate-x-0 lg:block">
    </app-sidebar>
  
    <div class="flex-grow flex flex-col min-w-0 h-screen overflow-hidden">
      <!-- Navbar -->
      <app-navbar (toggleSidebar)="toggleSidebar()"></app-navbar>
      
      <!-- Main Content -->
      <main class="p-4 lg:p-8 flex-grow overflow-y-auto">
        <router-outlet></router-outlet>
      </main>
    </div>
</div>
