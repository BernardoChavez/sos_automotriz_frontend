<div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="card p-4 shadow-lg border-0" style="width: 380px; border-radius: 20px;">
        <div class="text-center mb-4">
            <div class="mb-2">
                <i class="bi bi-person-circle fs-1 text-primary"></i>
            </div>
            <h3 class="fw-bold">Iniciar Sesión</h3>
            <p class="text-muted small">Accede a SOS Automotriz</p>
        </div>

        <form (ngSubmit)="onLogin()">
            <div class="mb-3">
                <label class="form-label small fw-bold">Email</label>
                <input type="email" class="form-control" name="email" [(ngModel)]="credentials.email" required
                    placeholder="">
            </div>

            <div class="mb-3">
                <label class="form-label small fw-bold">Contraseña</label>
                <input type="password" class="form-control" name="password" [(ngModel)]="credentials.password" required
                    placeholder="">
            </div>

            <div *ngIf="error" class="alert alert-danger py-2 small border-0 text-center" role="alert">
                <i class="bi bi-exclamation-triangle-fill"></i> {{error}}
            </div>

            <button type="submit" class="btn btn-primary w-100 fw-bold rounded-pill py-2 shadow-sm">
                INGRESAR
            </button>
        </form>

        <div class="text-center mt-4">
            <span class="text-muted small">¿No tienes cuenta? </span>
            <a routerLink="/registro" class="text-primary fw-bold text-decoration-none small">Regístrate</a>
        </div>
    </div>
</div>
