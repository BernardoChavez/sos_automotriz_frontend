<app-navbar></app-navbar>

<div class="container mt-4 pb-5">
    <div class="row">
        <div class="col-12 mb-4">
            <div
                class="card bg-primary text-white p-4 border-0 rounded-4 shadow d-flex flex-row justify-content-between align-items-center">
                <div>
                    <h2 class="fw-bold mb-1">
                        <i class="bi bi-gear-fill"></i> Panel: {{ tallerInfo?.nombre || 'Mi Taller' }}
                    </h2>
                    <p class="mb-0 opacity-75 text-uppercase small tracking-wider">
                        ID TALLER: #{{ adminInfo?.taller_id }} | ADMIN: {{ adminInfo?.nombre }}
                    </p>
                </div>

                <div class="bg-white text-dark p-3 rounded-4 shadow-sm d-flex align-items-center">
                    <div class="form-check form-switch mb-0">
                        <input class="form-check-input" type="checkbox" role="switch" id="estadoTaller"
                            [checked]="tallerInfo?.esta_activo" (change)="toggleEstadoTaller()"
                            style="width: 2.5em; height: 1.25em; cursor: pointer;">
                        <label class="form-check-label fw-bold ms-2" for="estadoTaller"
                            [ngClass]="tallerInfo?.esta_activo ? 'text-success' : 'text-danger'">
                            {{ tallerInfo?.esta_activo ? 'ABIERTO' : 'CERRADO' }}
                        </label>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-md-4 mb-4 text-dark">
            <div class="card border-0 shadow-sm rounded-4 p-4 h-100">
                <h5 class="fw-bold mb-3 text-primary">
                    <i class="bi bi-sliders"></i> Configuración Operativa
                </h5>

                <div *ngIf="mensajeExito" class="alert alert-success py-2 small animate__animated animate__fadeIn">
                    {{ mensajeExito }}
                </div>

                <div class="mb-3">
                    <label class="form-label small fw-bold text-muted">Nombre Comercial</label>
                    <input [(ngModel)]="tallerInfo.nombre" class="form-control form-control-sm rounded-3">
                </div>

                <div class="mb-3">
                    <label class="form-label small fw-bold text-muted">Especialidad</label>
                    <select [(ngModel)]="tallerInfo.especialidad" class="form-select form-select-sm rounded-3">
                        <option value="General">Mecánica General</option>
                        <option value="Electricidad">Electricidad / Electrónica</option>
                        <option value="Frenos">Frenos y Suspensión</option>
                        <option value="Chapería">Chapería y Pintura</option>
                    </select>
                </div>

                <div class="row">
                    <div class="col-6 mb-3">
                        <label class="form-label small fw-bold text-muted">Capacidad</label>
                        <input type="number" [(ngModel)]="tallerInfo.capacidad_teorica"
                            class="form-control form-control-sm rounded-3">
                    </div>
                    <div class="col-6 mb-3">
                        <label class="form-label small fw-bold text-muted">Teléfono</label>
                        <input [(ngModel)]="tallerInfo.telefono" class="form-control form-control-sm rounded-3">
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label small fw-bold text-muted">Dirección</label>
                    <textarea [(ngModel)]="tallerInfo.direccion" class="form-control form-control-sm rounded-3"
                        rows="2"></textarea>
                </div>

                <button (click)="actualizarConfiguracion()"
                    class="btn btn-primary w-100 rounded-pill fw-bold shadow-sm">
                    GUARDAR CAMBIOS
                </button>
            </div>
        </div>

        <div class="col-md-4 mb-4 text-dark">
            <div class="card border-0 shadow-sm rounded-4 p-4 h-100 bg-light">
                <h5 class="fw-bold text-danger mb-4">
                    <i class="bi bi-bell-fill"></i> Alertas SOS
                </h5>
                <div class="text-center py-5">
                    <i class="bi bi-shield-check text-success" style="font-size: 3rem;"></i>
                    <p class="text-muted mt-3 small">Todo bajo control en tu zona.</p>
                </div>
            </div>
        </div>

        <div class="col-md-4 mb-4 text-dark">
            <div class="card border-0 shadow-sm rounded-4 p-4 h-100">
                <h5 class="fw-bold mb-3 text-dark">
                    <i class="bi bi-person-badge-fill text-dark"></i> Mi Equipo
                </h5>

                <div class="bg-white p-3 rounded-4 mb-4 border border-primary border-opacity-25 shadow-sm">
                    <input [(ngModel)]="nuevoTecnico.nombre" class="form-control form-control-sm mb-2"
                        placeholder="Nombre">
                    <input [(ngModel)]="nuevoTecnico.email" class="form-control form-control-sm mb-2"
                        placeholder="Email">
                    <input type="password" [(ngModel)]="nuevoTecnico.password" class="form-control form-control-sm mb-2"
                        placeholder="Password">

                    <button (click)="registrarTecnico()" class="btn btn-dark btn-sm w-100 rounded-pill fw-bold">
                        CONTRATAR
                    </button>
                </div>

                <div class="list-group list-group-flush">
                    <div *ngFor="let t of tecnicos"
                        class="list-group-item d-flex justify-content-between align-items-center px-1 border-light bg-transparent">
                        <div class="d-flex align-items-center">
                            <div [ngClass]="t.disponible ? 'bg-success' : 'bg-secondary'" class="rounded-circle me-2"
                                style="width: 10px; height: 10px;"></div>
                            <span class="small fw-bold">{{ t.nombre }}</span>
                        </div>
                        <button (click)="eliminarUsuario(t.id)" class="btn btn-link text-danger p-0"><i
                                class="bi bi-x-circle"></i></button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
