<app-navbar></app-navbar>

<div class="container mt-4">
    <div class="row">
        <div class="col-md-4">
            <div class="card shadow-lg border-0 rounded-4 overflow-hidden mb-4">
                <div class="bg-primary p-4 text-center">
                    <i class="bi bi-person-badge-fill text-white" style="font-size: 4rem;"></i>
                </div>
                <div class="card-body text-center p-4">
                    <h4 class="fw-bold mb-0 text-dark">{{ tecnico.nombre }}</h4>
                    <p class="text-muted small mb-3 text-uppercase">Técnico de Auxilio</p>

                    <div class="bg-light p-3 rounded-3 mb-4 text-dark shadow-sm">
                        <div class="small text-muted mb-1">Estado Actual</div>
                        <h5 [ngClass]="estaDisponible ? 'text-success' : 'text-danger'" class="fw-bold mb-0">
                            {{ estaDisponible ? '● DISPONIBLE' : '○ EN SERVICIO' }}
                        </h5>
                    </div>

                    <div class="d-grid gap-2">
                        <button (click)="toggleDisponibilidad()"
                            [ngClass]="estaDisponible ? 'btn-outline-danger' : 'btn-success'"
                            class="btn btn-lg fw-bold rounded-pill shadow-sm">
                            <i class="bi" [ngClass]="estaDisponible ? 'bi-dash-circle' : 'bi-check-circle'"></i>
                            {{ estaDisponible ? ' Ponerse en Ocupado' : ' Volver a Disponible' }}
                        </button>
                    </div>
                </div>
            </div>

            <div class="card shadow-sm border-0 rounded-4 mt-4 p-3 bg-dark text-white">
                <div class="d-flex justify-content-between align-items-center">
                    <span>Servicios hoy</span>
                    <span class="badge bg-primary rounded-pill">{{ historialTrabajos.length }}</span>
                </div>
            </div>
        </div>

        <div class="col-md-8">
            <div class="card shadow-lg border-0 rounded-4 p-4 h-100 text-dark text-center">
                <h5 class="fw-bold mb-4 text-start">
                    <i class="bi bi-clock-history text-primary me-2"></i>Historial de Trabajos
                </h5>
                <div class="my-auto py-5 text-muted">
                    <i class="bi bi-clipboard-x fs-1 opacity-25"></i>
                    <p class="mt-3">No hay servicios registrados hoy.</p>
                </div>
            </div>
        </div>
    </div>
</div>
